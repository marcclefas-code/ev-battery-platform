name: Deploy to Server2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER2_HOST }}
          username: root
          password: ${{ secrets.SERVER2_SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /opt/ev-battery-platform
            if [ ! -d .git ]; then
              git clone https://github.com/marcclefas-code/ev-battery-platform.git .
            else
              git pull origin main
            fi
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install hatchet-sdk
            alembic upgrade head || true
            python scripts/seed_property_definitions.py || true
            docker build -t ev-battery-platform:latest .
            docker stop ev-battery-api 2>/dev/null || true
            docker rm ev-battery-api 2>/dev/null || true
            docker run -d \
              --name ev-battery-api \
              --restart unless-stopped \
              --network=hatchet-network \
              -p 8090:8090 \
              -e DATABASE_URL="${DATABASE_URL}" \
              -e HATCHET_CLIENT_TOKEN="${HATCHET_CLIENT_TOKEN}" \
              -e HATCHET_CLIENT_HOST_PORT="${HATCHET_CLIENT_HOST_PORT}" \
              -e LITELLM_BASE_URL="${LITELLM_BASE_URL}" \
              -e CRAWL4AI_URL="${CRAWL4AI_URL}" \
              -e REDIS_URL="${REDIS_URL}" \
              -e SECRET_KEY="${SECRET_KEY}" \
              ev-battery-platform:latest

      - name: Smoke test after deploy
        run: |
          sleep 20
          curl -sf http://144.91.126.111:8090/api/v1/health/ || { echo "Health check failed"; exit 1; }
          echo "Deploy smoke test passed"
