name: Deploy to Server2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER2_HOST }}
          username: root
          password: ${{ secrets.SERVER2_SSH_PASSWORD }}
          port: 22
          script: |
            set -e

            # Clone/update repo
            mkdir -p /opt/ev-battery-platform
            cd /opt/ev-battery-platform
            if [ ! -d .git ]; then
              git clone https://github.com/marcclefas-code/ev-battery-platform.git .
            else
              git pull origin main
            fi

            # Build Docker image
            docker build -t ev-battery-platform:latest .

            # Stop and remove old container (ignore errors)
            docker rm -f ev-battery-api 2>/dev/null || true

            # Force-remove any stuck container in Created state
            STATE=$(docker inspect ev-battery-api --format='{{.State.Status}}' 2>/dev/null || echo "removed")
            if [ "$STATE" = "created" ]; then
              docker rm -f ev-battery-api 2>/dev/null || true
            fi

            # Wait for port 8090 to be free (up to 15s)
            for i in $(seq 1 15); do
              if ss -tlnp 2>/dev/null | grep -q ':8090 '; then
                echo "Port 8090 still in use, waiting... ($i/15)"
                sleep 1
              else
                echo "Port 8090 is free"
                break
              fi
            done

            # Kill any process still holding port 8090 using full path
            /usr/bin/fuser -k 8090/tcp 2>/dev/null || true
            sleep 2

            # Verify port is free before starting container
            if ss -tlnp 2>/dev/null | grep -q ':8090 '; then
              echo "ERROR: Port 8090 still in use after cleanup. Dumping port info:"
              ss -tlnp | grep 8090 || true
              docker ps -a | grep ev-battery || true
              exit 1
            fi

            # Export secrets for docker run
            export HATCHET_TOKEN='${{ secrets.HATCHET_CLIENT_TOKEN }}'
            export SECRET_KEY='${{ secrets.SECRET_KEY }}'

            # Run new container on intelligence-internal network so it can reach:
            # - intelligence-enrichment-crm-db:5432 (PostgreSQL)
            # - hatchet-hatchet-engine-1:7070 (Hatchet engine)
            # - intelligence-litellm:4000 (LiteLLM)
            docker run -d \
              --name ev-battery-api \
              --restart unless-stopped \
              --network=intelligence-internal \
              -p 8090:8090 \
              -e DATABASE_URL="postgresql://ev_battery_user:ev_battery_pass@intelligence-enrichment-crm-db:5432/ev_battery" \
              -e HATCHET_CLIENT_TOKEN="$HATCHET_TOKEN" \
              -e HATCHET_CLIENT_HOST_PORT="hatchet-hatchet-engine-1:7070" \
              -e HATCHET_CLIENT_TLS_STRATEGY="none" \
              -e LITELLM_BASE_URL="http://intelligence-litellm:4000/v1" \
              -e SECRET_KEY="$SECRET_KEY" \
              ev-battery-platform:latest

      - name: Smoke test after deploy
        run: |
          sleep 25
          curl -sf http://144.91.126.111:8090/api/v1/health/ || { echo "Health check failed"; exit 1; }
          echo "Deploy smoke test passed"
