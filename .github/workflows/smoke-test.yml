name: API Smoke Test

on:
  push:
    branches: [main]

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx uvicorn

      - name: Run smoke tests
        run: |
          timeout 15 python -c "
import httpx
import time
import subprocess

proc = subprocess.Popen(
    ['uvicorn', 'app.main:app', '--host', '127.0.0.1', '--port', '8090'],
    cwd='/home/runner/work/ev-battery-platform/ev-battery-platform'
)
time.sleep(4)

try:
    client = httpx.Client(base_url='http://127.0.0.1:8090', timeout=10)

    r = client.get('/api/v1/health/')
    assert r.status_code == 200, f'health failed: {r.status_code}'
    print('OK: Health check')

    r = client.post('/api/v1/auth/login', json={'username': 'admin', 'password': 'admin-secret'})
    assert r.status_code == 200, f'login failed: {r.status_code}'
    token = r.json()['access_token']
    print('OK: Login')

    headers = {'Authorization': f'Bearer {token}'}
    r = client.get('/api/v1/entities/', headers=headers)
    assert r.status_code == 200
    print('OK: Entities')

    r = client.get('/api/v1/config/brands', headers=headers)
    assert r.status_code == 200
    print('OK: Brands config')

    print('All smoke tests passed!')
finally:
    proc.terminate()
    proc.wait()
"
