name: API Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run smoke tests against deployed server
        run: |
          python -c "
import httpx
import sys

client = httpx.Client(base_url='http://144.91.126.111:8090', timeout=15)

# Health check
r = client.get('/api/v1/health/')
assert r.status_code == 200, f'health failed: {r.status_code}'
print('OK: Health check')

# Login
r = client.post('/api/v1/auth/login', json={'username': 'admin', 'password': 'admin-secret'})
assert r.status_code == 200, f'login failed: {r.status_code}'
token = r.json()['access_token']
print('OK: Login')

headers = {'Authorization': f'Bearer {token}'}

# Entities endpoint
r = client.get('/api/v1/entities/', headers=headers)
assert r.status_code == 200, f'entities failed: {r.status_code}'
print('OK: Entities')

# Brands config
r = client.get('/api/v1/config/brands', headers=headers)
assert r.status_code == 200, f'brands failed: {r.status_code}'
print('OK: Brands config')

# Scrape plans endpoint
r = client.get('/api/v1/scrape/plans/', headers=headers)
assert r.status_code == 200, f'scrape plans failed: {r.status_code}'
print('OK: Scrape plans')

# Vehicle variants
r = client.get('/api/v1/vehicles/variants/', headers=headers)
assert r.status_code == 200, f'vehicle variants failed: {r.status_code}'
print('OK: Vehicle variants')

print('All smoke tests passed!')
"
